<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340" width="200" height="340">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#252530"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#3a3a4a"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50506a"/>
      <stop offset="100%" stop-color="#40405a"/>
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#606080"/>
      <stop offset="100%" stop-color="#484868"/>
    </linearGradient>
    <linearGradient id="sideGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Mouse body shadow -->
  <ellipse cx="100" cy="300" rx="70" ry="12" fill="#000" opacity="0.2"/>

  <!-- Mouse body -->
  <path d="M 40 120 C 40 60, 60 30, 100 30 C 140 30, 160 60, 160 120 L 160 260 C 160 300, 140 320, 100 320 C 60 320, 40 300, 40 260 Z"
        fill="url(#bodyGrad)" stroke="#555" stroke-width="1" filter="url(#shadow)"/>

  <!-- Top surface -->
  <path d="M 44 120 C 44 64, 62 34, 100 34 C 138 34, 156 64, 156 120 L 156 250 C 156 288, 138 316, 100 316 C 62 316, 44 288, 44 250 Z"
        fill="url(#topGrad)"/>

  <!-- Divider line -->
  <line x1="100" y1="36" x2="100" y2="160" stroke="#2a2a38" stroke-width="1.5"/>

  <!-- Left click button -->
  <path d="M 48 120 C 48 66, 64 38, 98 38 L 98 158 L 48 158 Z"
        fill="url(#btnGrad)" opacity="0.6" rx="4"/>

  <!-- Right click button -->
  <path d="M 152 120 C 152 66, 136 38, 102 38 L 102 158 L 152 158 Z"
        fill="url(#btnGrad)" opacity="0.6" rx="4"/>

  <!-- Scroll wheel -->
  <rect x="90" y="80" width="20" height="50" rx="10" fill="url(#wheelGrad)" stroke="#5a5a7a" stroke-width="1"/>
  <!-- Wheel ticks -->
  <line x1="94" y1="92" x2="106" y2="92" stroke="#7a7a9a" stroke-width="0.8" opacity="0.6"/>
  <line x1="94" y1="100" x2="106" y2="100" stroke="#7a7a9a" stroke-width="0.8" opacity="0.6"/>
  <line x1="94" y1="108" x2="106" y2="108" stroke="#7a7a9a" stroke-width="0.8" opacity="0.6"/>
  <line x1="94" y1="116" x2="106" y2="116" stroke="#7a7a9a" stroke-width="0.8" opacity="0.6"/>

  <!-- Side button 1 (forward) - with accent glow -->
  <rect x="36" y="140" width="12" height="28" rx="4" fill="url(#sideGrad)" filter="url(#glow)"/>

  <!-- Side button 2 (back) -->
  <rect x="36" y="175" width="12" height="28" rx="4" fill="url(#sideGrad)" filter="url(#glow)"/>

  <!-- Subtle grip texture on sides -->
  <g opacity="0.15" stroke="#888" stroke-width="0.6">
    <line x1="44" y1="220" x2="44" y2="290"/>
    <line x1="47" y1="218" x2="47" y2="292"/>
    <line x1="50" y1="216" x2="50" y2="294"/>
    <line x1="150" y1="220" x2="150" y2="290"/>
    <line x1="153" y1="218" x2="153" y2="292"/>
    <line x1="156" y1="216" x2="156" y2="294"/>
  </g>

  <!-- DPI button -->
  <rect x="92" y="148" width="16" height="8" rx="3" fill="#3a3a50" stroke="#5a5a7a" stroke-width="0.8"/>

  <!-- LED indicator -->
  <circle cx="100" cy="170" r="2.5" fill="#00b4d8" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle highlight on top -->
  <ellipse cx="100" cy="60" rx="40" ry="20" fill="white" opacity="0.03"/>
</svg>
