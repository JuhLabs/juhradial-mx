<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Unknown OS - monitor/computer icon with question mark -->
  <!-- Monitor body -->
  <rect x="12" y="10" width="76" height="56" rx="6" fill="none" stroke="#888" stroke-width="4"/>
  <!-- Screen -->
  <rect x="18" y="16" width="64" height="44" rx="2" fill="#555" opacity="0.15"/>
  <!-- Stand -->
  <rect x="40" y="68" width="20" height="10" fill="#888"/>
  <!-- Base -->
  <rect x="30" y="78" width="40" height="5" rx="2" fill="#888"/>
  <!-- Question mark -->
  <text x="50" y="52" font-family="sans-serif" font-size="36" font-weight="bold" fill="#888" text-anchor="middle">?</text>
</svg>
