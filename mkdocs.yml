site_name: JuhRadial MX
site_description: >-
  The ultimate Logitech MX Master experience on Linux. Radial menu, haptics,
  button and thumb-wheel remapping, per-app profiles, Easy-Switch, and
  cross-computer Flow, native on Wayland.
site_url: https://juhlabs.github.io/juhradial-mx/
site_author: JuhLabs
copyright: Copyright &copy; JuhLabs, GPL-3.0

repo_url: https://github.com/JuhLabs/juhradial-mx
repo_name: JuhLabs/juhradial-mx
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/juhradial-mx.svg
  favicon: assets/juhradial-mx.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Installation: installation.md
  - Features: features.md
  - Configuration: configuration.md
  - Compositor Support: compositor-support.md
  - Troubleshooting: troubleshooting.md
  - Architecture: architecture.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: On this page
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JuhLabs/juhradial-mx
      name: JuhRadial MX on GitHub
  generator: false
